services:
  - type: web
    name: electrostore-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server:start
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: CLIENT_URL
        sync: false
